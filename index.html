<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Lista de produtos</title>
</head>
<body>
    <div id="container">
        <div class="card">
            <img src="./img/caixa-de-som-jbl-flip-5.png" alt="Foto da caixa de som">
            <h3>Alto-falante Jb1 Flip7 Portátil Bluetooth Caixa Som</h3>
            <span>R$109,22</span>
        </div>
        <div class="card">
            <img src="./img/camera-sony-alpha-a7-iii.png" alt="Foto da camera">
            <h3>Sony Alpha 7 III Kit ILCE-7M3K sem espelho cor preto</h3>
            <span>R$11.550</span>
        </div>
        <div class="card">
            <img src="./img/fone-de-ouvido-bluetooth-jbl-tune-500bt.png" alt="Foto do fone">
            <h3>JBL Fone de Ouvido sem Fio Tune 520BT</h3>
            <span>R$242</span>
        </div>
        <div class="card">
            <img src="./img/monitor-samsung-led-23.8.png" alt="Foto do moitor">
            <h3>Monitor Samsung Led</h3>
            <span></span>
        </div>
        <div class="card">
            <img src="./img/mouse-gamer-logitech-g-pro.png" alt="Foto do mouse">
            <h3>Mouse game logitech Pro</h3>
            <span></span>

        </div>
    </div>

</html>
